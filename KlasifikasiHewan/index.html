<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Animal Classification AI</title>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="app-layout">

        <!-- SIDEBAR -->
        <div class="sidebar">

            <h2>
                🐾 Animal AI
            </h2>

            <button onclick="showSection('detectSection')">
                🐾 Detection
            </button>

            <button onclick="showSection('questionSection')">
                🎯 Question
            </button>

        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">

            <!-- DETECTION SECTION -->
            <div id="detectSection">

                <div class="container">

                    <h1>
                        🐾 Animal Classification AI
                    </h1>

                    <p class="subtitle">
                        Upload gambar hewan dan AI akan mengenalinya
                    </p>

                    <!-- Upload -->
                    <label class="upload-box">

                        <input 
                            type="file"
                            id="imageUpload"
                            accept="image/*"
                            hidden
                        >

                        <div>
                            📸 Klik untuk upload gambar
                        </div>

                    </label>

                    <!-- Preview -->
                    <img id="previewImage">

                    <!-- Webcam -->
                    <div id="webcam-container">

                        <button onclick="startWebcam()">
                            🎥 Aktifkan Kamera
                        </button>

                    </div>

                    <!-- Predict -->
                    <button id="predictBtn">

                        🔍 Prediksi Hewan

                    </button>

                    <!-- Loading -->
                    <div id="loading">

                        AI sedang menganalisis gambar...

                    </div>

                    <!-- Result -->
                    <div id="resultContainer">

                        <h2 id="animalName">
                            -
                        </h2>

                        <p id="confidenceText">
                            0%
                        </p>

                        <div class="progress-bar">

                            <div class="progress-fill" id="progressFill"></div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- QUESTION SECTION -->
            <div id="questionSection">

                <div class="question-page">

                    <div class="question-title">

                        <h1>
                            🎯 Question Menu
                        </h1>

                        <p class="subtitle">
                            Pilih jenis quiz untuk belajar hewan
                        </p>

                    </div>

                    <div class="question-buttons">

                        <button onclick="showQuiz('audio')">
                            🔊 Audio Quiz
                        </button>

                        <button onclick="showQuiz('visual')">
                            🎨 Visual Quiz
                        </button>

                        <button onclick="showQuiz('multiple')">
                            📝 Multiple Choice
                        </button>

                        <button onclick="showQuiz('essay')">
                            ✍ Essay Quiz
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- TensorFlow -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>

    <!-- Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
